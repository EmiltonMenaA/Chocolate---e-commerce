services:
  db:
    image: postgres:16-alpine
    container_name: chocolate_db
    environment:
      POSTGRES_DB: chocolate_db
      POSTGRES_USER: chocolate_user
      POSTGRES_PASSWORD: chocolate_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chocolate_user -d chocolate_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chocolate_web
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: chocolate_frontend
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://web:8000
    depends_on:
      - web

volumes:
  postgres_data:
