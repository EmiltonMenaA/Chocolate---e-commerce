<svg viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg" width="200" height="210">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a2d14"/>
      <stop offset="100%" stop-color="#3b1a0a"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d078"/>
      <stop offset="40%" stop-color="#e8b84b"/>
      <stop offset="70%" stop-color="#c9922a"/>
      <stop offset="100%" stop-color="#e8b84b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Subtle texture ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#e8b84b" stroke-width="0.6" opacity="0.3" style="fill:none;stroke:rgb(232, 184, 75);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#e8b84b" stroke-width="0.3" opacity="0.2" style="fill:none;stroke:rgb(232, 184, 75);color:rgb(255, 255, 255);stroke-width:0.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Lipstick -->
  <g filter="url(#glow)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Lipstick body -->
    <rect x="100" y="68" width="10" height="22" rx="1" fill="none" stroke="url(#goldGrad)" stroke-width="1.3" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Lipstick bullet -->
    <path d="M100 68 Q105 58 110 68" fill="none" stroke="url(#goldGrad)" stroke-width="1.3" stroke-linejoin="round" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.3px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Lipstick base -->
    <rect x="98" y="90" width="14" height="5" rx="1" fill="none" stroke="url(#goldGrad)" stroke-width="1.3" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Cream jar -->
    <ellipse cx="88" cy="94" rx="9" ry="3.5" fill="none" stroke="url(#goldGrad)" stroke-width="1.3" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="79" y="94" width="18" height="7" fill="none" stroke="url(#goldGrad)" stroke-width="1.3" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <ellipse cx="88" cy="101" rx="9" ry="3.5" fill="none" stroke="url(#goldGrad)" stroke-width="1.3" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Branch and leaves -->
    <!-- Main stem -->
    <path d="M108 90 C114 82 118 72 120 62" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Leaf 1 -->
    <path d="M114 80 C118 74 124 74 122 80 C120 84 114 82 114 80Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" style="fill:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Leaf 2 -->
    <path d="M116 72 C120 66 126 66 124 73 C122 77 116 75 116 72Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" style="fill:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Leaf 3 small -->
    <path d="M119 64 C122 59 127 60 125 65 C123 68 119 66 119 64Z" fill="none" stroke="url(#goldGrad)" stroke-width="0.9" style="fill:none;color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Sparkles -->
    <!-- Sparkle 1 -->
    <path d="M90 62 L91 58 L92 62 L96 63 L92 64 L91 68 L90 64 L86 63 Z" fill="url(#goldGrad)" opacity="0.9" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Sparkle 2 small -->
    <path d="M113 56 L113.8 53 L114.6 56 L117.6 56.8 L114.6 57.6 L113.8 60.6 L113 57.6 L110 56.8 Z" fill="url(#goldGrad)" opacity="0.8" transform="scale(0.7) translate(48 24)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Sparkle 3 tiny -->
    <path d="M126 68 L126.5 66 L127 68 L129 68.5 L127 69 L126.5 71 L126 69 L124 68.5 Z" fill="url(#goldGrad)" opacity="0.7" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Sparkle 4 tiny -->
    <path d="M82 72 L82.4 70.2 L82.8 72 L84.6 72.4 L82.8 72.8 L82.4 74.6 L82 72.8 L80.2 72.4 Z" fill="url(#goldGrad)" opacity="0.6" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- "CB" initials in elegant script style -->
  <text x="100" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" font-weight="400" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="1" filter="url(#glow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:13px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">Chocolate</text>
  <text x="100" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="8.5" font-weight="600" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="3.5" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:8.5px;font-weight:600;text-anchor:middle;dominant-baseline:auto">BEAUTY</text>

  <!-- Bottom decorative line -->
  <line x1="72" y1="156" x2="128" y2="156" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.5" style="fill:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>